<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$title$</title>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['\\(','\\)']],
    displayMath: [['\\[','\\]']],
    processEscapes: true,
    processEnvironments: true,
    tags: 'ams',
    macros: {
      text: ['\\textrm{#1}', 1]
    }
  },
  svg: {
    fontCache: 'global',
    scale: 1.0
  },
  options: {
    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
    ignoreHtmlClass: 'nostem|noasciimath',
    processHtmlClass: 'math'
  },
  startup: {
    pageReady: function() {
      return MathJax.startup.defaultPageReady().then(function() {
        document.body.setAttribute('data-mathjax-done', 'true');
        console.log('MathJax rendering complete');
      });
    }
  }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@4.1.1/tex-svg.js"></script>
<style>
/* ===== Web Fonts ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Math&display=swap');

/* ===== Page & Print Setup ===== */
@page {
  size: letter;
  margin: 1in 1in 1in 1in;
}

@media print {
  body { font-size: 10pt; }
  h1, h2, h3, h4 { page-break-after: avoid; }
  table, figure, pre { page-break-inside: avoid; }
  .page-break { page-break-before: always; }
}

/* ===== Base Typography ===== */
:root {
  --text-color: #1a1a1a;
  --heading-color: #0d0d0d;
  --accent-color: #2c5282;
  --border-color: #cbd5e0;
  --bg-subtle: #f7fafc;
  --font-serif: "Noto Sans", "Helvetica Neue", Arial, sans-serif;
  --font-sans: "Noto Sans", "Helvetica Neue", Arial, sans-serif;
  --font-math: "Noto Sans Math", "Noto Sans", serif;
  --font-mono: "Consolas", "Monaco", "Courier New", monospace;
}

* {
  box-sizing: border-box;
}

body {
  font-family: var(--font-serif);
  font-size: 11pt;
  line-height: 1.65;
  color: var(--text-color);
  max-width: 7.5in;
  margin: 0 auto;
  padding: 0.5in 0;
  background: #fff;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

/* ===== Headings ===== */
h1 {
  font-family: var(--font-sans);
  font-size: 22pt;
  font-weight: 700;
  color: var(--heading-color);
  text-align: center;
  margin: 0.3em 0 0.15em 0;
  line-height: 1.25;
  letter-spacing: -0.02em;
}

h2 {
  font-family: var(--font-sans);
  font-size: 15pt;
  font-weight: 600;
  color: var(--heading-color);
  margin: 1.8em 0 0.6em 0;
  padding-bottom: 0.25em;
  border-bottom: 2px solid var(--accent-color);
  line-height: 1.3;
}

h3 {
  font-family: var(--font-sans);
  font-size: 12.5pt;
  font-weight: 600;
  color: var(--accent-color);
  margin: 1.4em 0 0.5em 0;
  line-height: 1.35;
}

h4 {
  font-family: var(--font-sans);
  font-size: 11pt;
  font-weight: 600;
  color: #4a5568;
  margin: 1.2em 0 0.4em 0;
  line-height: 1.4;
}

h5, h6 {
  font-family: var(--font-sans);
  font-size: 10.5pt;
  font-weight: 600;
  color: #718096;
  margin: 1em 0 0.3em 0;
}

/* ===== Paragraphs & Text ===== */
p {
  margin: 0.6em 0;
  text-align: justify;
  hyphens: auto;
  -webkit-hyphens: auto;
}

strong {
  font-weight: 700;
  color: var(--heading-color);
}

em {
  font-style: italic;
}

/* ===== Links ===== */
a {
  color: var(--accent-color);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* ===== Horizontal Rules ===== */
hr {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 1.5em 0;
}

/* ===== Block Quotes ===== */
blockquote {
  margin: 1em 0;
  padding: 0.6em 1.2em;
  border-left: 4px solid var(--accent-color);
  background: var(--bg-subtle);
  font-style: italic;
  color: #4a5568;
}

blockquote p {
  margin: 0.3em 0;
}

/* ===== Lists ===== */
ul, ol {
  margin: 0.6em 0;
  padding-left: 1.8em;
}

li {
  margin: 0.25em 0;
  line-height: 1.55;
}

li > ul, li > ol {
  margin: 0.15em 0;
}

/* ===== Tables ===== */
table {
  border-collapse: collapse;
  width: 100%;
  margin: 1em 0;
  font-size: 9.5pt;
  line-height: 1.4;
}

thead {
  background: var(--accent-color);
  color: white;
}

th {
  font-family: var(--font-sans);
  font-weight: 600;
  padding: 0.5em 0.6em;
  text-align: left;
  border: 1px solid #1a365d;
  font-size: 9pt;
}

td {
  padding: 0.4em 0.6em;
  border: 1px solid var(--border-color);
  vertical-align: top;
}

tbody tr:nth-child(even) {
  background: var(--bg-subtle);
}

/* ===== Code Blocks ===== */
code {
  font-family: var(--font-mono);
  font-size: 9pt;
  background: #edf2f7;
  padding: 0.15em 0.35em;
  border-radius: 3px;
  color: #c53030;
}

pre {
  background: #1a202c;
  color: #e2e8f0;
  padding: 1em 1.2em;
  border-radius: 6px;
  overflow-x: auto;
  font-size: 8.5pt;
  line-height: 1.5;
  margin: 1em 0;
}

pre code {
  background: none;
  color: inherit;
  padding: 0;
  border-radius: 0;
  font-size: inherit;
}

/* ===== Math Rendering ===== */
mjx-container {
  font-family: var(--font-math);
  overflow-x: auto;
  overflow-y: hidden;
  max-width: 100%;
}

mjx-container[display="true"] {
  margin: 0.8em 0 !important;
  text-align: center;
}

/* ===== Footnotes ===== */
.footnote-ref {
  font-size: 0.75em;
  vertical-align: super;
}

.footnotes {
  margin-top: 2em;
  padding-top: 1em;
  border-top: 1px solid var(--border-color);
  font-size: 9pt;
}

/* ===== Suppress very long unbroken strings ===== */
td, th {
  word-wrap: break-word;
  overflow-wrap: break-word;
  max-width: 300px;
}

/* ===== Print Optimizations ===== */
@media print {
  body {
    max-width: none;
    padding: 0;
    margin: 0;
  }

  pre {
    background: #f5f5f5 !important;
    color: #1a1a1a !important;
    border: 1px solid #ccc;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  pre code {
    color: #1a1a1a !important;
  }

  thead {
    background: #e2e8f0 !important;
    color: #1a1a1a !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  th {
    border-color: #a0aec0 !important;
    color: #1a1a1a !important;
  }

  tbody tr:nth-child(even) {
    background: #f7fafc !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  a {
    color: var(--accent-color) !important;
    text-decoration: none !important;
  }

  a[href]:after {
    content: none !important;
  }
}
</style>
</head>
<body>
$body$
</body>
</html>
