# ==============================================================================
# BUILD PDF — IRH Manuscript
# ==============================================================================
#
# Converts 87.0IRH.md to a professionally formatted PDF with MathJax-rendered
# equations and uploads it as a downloadable GitHub Actions artifact.
#
# Pipeline:
#   pandoc (markdown → HTML with MathJax) → Chromium headless (HTML → PDF)
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the Actions tab (with options)
#   - push to main: Automatically rebuild on manuscript changes
#
# The PDF artifact is available for download for 30 days under
# Actions → build-pdf run → Artifacts → IRH-manuscript-pdf
# ==============================================================================

name: "Build PDF — IRH Manuscript"

on:
  workflow_dispatch:
    inputs:
      manuscript:
        description: "Manuscript file to convert (relative to repo root)"
        required: false
        default: "87.0IRH.md"
        type: string
      retention_days:
        description: "Artifact retention period (days)"
        required: false
        default: "30"
        type: string
  push:
    branches: [main]
    paths:
      - "Interference_Geometry2.md"
      - "tools/template.html"
      - "tools/build-pdf.sh"
      - "tools/html-to-pdf.js"

concurrency:
  group: build-pdf-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-pdf:
    name: "Render MathJax PDF"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Install system dependencies: pandoc + Chrome + fonts
      # ----------------------------------------------------------------
      - name: Install pandoc, Chrome, and fonts
        run: |
          # Add Google Chrome repository (avoids snap-based chromium which
          # cannot access files under /home/runner/work due to confinement)
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'

          sudo apt-get update -qq

          sudo apt-get install -y -qq \
            pandoc \
            google-chrome-stable \
            fonts-liberation \
            fonts-noto \
            fonts-noto-extra \
            fonts-noto-cjk \
            fonts-freefont-ttf

          # Refresh font cache so Chrome can discover all installed fonts,
          # including Noto Sans Math (contained in fonts-noto-extra).
          fc-cache -f -v
          echo 'Font match for "Noto Sans Math":'
          fc-match "Noto Sans Math"
          if ! fc-list | grep -i "Noto Sans Math"; then
            echo 'Required font "Noto Sans Math" is not discoverable after installation.' >&2
            exit 1
          fi

          CHROMIUM_PATH="$(command -v google-chrome-stable)"
          if [ -z "$CHROMIUM_PATH" ]; then
            echo "Google Chrome executable was not found after installation." >&2
            exit 1
          fi

          echo "CHROMIUM_PATH=$CHROMIUM_PATH" >> "$GITHUB_ENV"

          pandoc --version | head -1
          echo "Browser binary:  $CHROMIUM_PATH"
          "$CHROMIUM_PATH" --version

      # ----------------------------------------------------------------
      # 3. Set up Node.js and install puppeteer-core
      # ----------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: tools/package-lock.json

      - name: Install puppeteer-core
        working-directory: tools
        run: npm ci

      # ----------------------------------------------------------------
      # 4. Build HTML (pandoc converts markdown; MathJax loads from CDN
      #    at render time so network access is still required)
      # ----------------------------------------------------------------
      - name: Convert markdown to HTML
        run: |
          MANUSCRIPT="${{ github.event.inputs.manuscript || 'Interference$Geomet.md' }}"
          BASENAME="$(basename "$MANUSCRIPT" Interference_Geometry2.md)"

          pandoc "$MANUSCRIPT" \
            --from=markdown+tex_math_dollars+pipe_tables+yaml_metadata_block+smart+footnotes+strikeout+superscript+subscript \
            --to=html5 \
            --template=tools/template.html \
            --mathjax \
            --standalone \
            --wrap=none \
            --columns=9999 \
            --metadata title="Intrinsic Resonance Holography" \
            --output="${BASENAME}.html"

          HTML_KB=$(( $(wc -c < "${BASENAME}.html") / 1024 ))
          MATH_INLINE=$(grep -c 'class="math inline"' "${BASENAME}.html" || true)
          MATH_DISPLAY=$(grep -c 'class="math display"' "${BASENAME}.html" || true)
          TABLES=$(grep -c '<table' "${BASENAME}.html" || true)

          echo "HTML generated: ${HTML_KB} KB"
          echo "Inline math expressions: ${MATH_INLINE}"
          echo "Display math blocks: ${MATH_DISPLAY}"
          echo "Tables: ${TABLES}"

          # Export for subsequent steps
          echo "BASENAME=${BASENAME}" >> "$GITHUB_ENV"

      # ----------------------------------------------------------------
      # 5. Render MathJax + print PDF (Chromium headless)
      # ----------------------------------------------------------------
      - name: Render MathJax and generate PDF
        run: |
          node tools/html-to-pdf.js "${BASENAME}.html" "${BASENAME}.pdf"

      # ----------------------------------------------------------------
      # 6. Verify PDF integrity
      # ----------------------------------------------------------------
      - name: Verify PDF
        run: |
          if [ ! -f "${BASENAME}.pdf" ]; then
            echo "ERROR: PDF file not found."
            exit 1
          fi

          PDF_KB=$(( $(wc -c < "${BASENAME}.pdf") / 1024 ))
          echo "PDF size: ${PDF_KB} KB"

          # Minimum sanity check — a real PDF must be at least 1 MB for this doc
          if [ "$PDF_KB" -lt 1000 ]; then
            echo "ERROR: PDF is suspiciously small (${PDF_KB} KB). Generation may have failed."
            exit 1
          fi

          # Check page count via PDF structure
          PAGE_COUNT=$(strings "${BASENAME}.pdf" | grep -c "/Type /Page" || echo "0")
          echo "Approximate page count: ${PAGE_COUNT}"

          # Check that the document ends with the expected marker
          sudo apt-get install -y -qq poppler-utils 2>/dev/null
          if command -v pdftotext &>/dev/null; then
            pdftotext "${BASENAME}.pdf" /tmp/pdf_verify.txt 2>/dev/null
            if grep -q "END OF MANUSCRIPT" /tmp/pdf_verify.txt; then
              echo "✅ Content verification: 'END OF MANUSCRIPT' found — document is complete."
            else
              echo "⚠️  WARNING: 'END OF MANUSCRIPT' marker not found — document may be truncated."
            fi
            rm -f /tmp/pdf_verify.txt
          fi

          echo ""
          echo "PDF generation summary:"
          echo "  File:  ${BASENAME}.pdf"
          echo "  Size:  ${PDF_KB} KB"
          echo "  Pages: ~${PAGE_COUNT}"

      # ----------------------------------------------------------------
      # 7. Upload as artifact
      # ----------------------------------------------------------------
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: IRH-manuscript-pdf
          path: ${{ env.BASENAME }}.pdf
          retention-days: ${{ github.event.inputs.retention_days || '30' }}
          if-no-files-found: error
